<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LearnSync Login</title>
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="styleguide.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="mainS">

        <img class="ellipse" src="img/ellipse-1.png" alt="Palangon High School logo" />
        <h1 class="text-wrapper">LEARNSYNC</h1>
        <section class="rectangle" aria-labelledby="login-heading">
            <h2 class="div" id="login-heading">Login</h2>
            <form action="#" method="post" novalidate>
                <div class="group">
                    <img class="img" src="img/rectangle-28.png" alt="" aria-hidden="true" />
                    <label class="text-wrapper-3" for="role">Select Role</label>
                    <select id="role" name="role" aria-label="Select Role">
                        <option value="" selected>Select Role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                    <img class="keyboard-arrow-down" src="img/keyboard-arrow-down.svg" alt="" aria-hidden="true" />
                </div>
                <div class="group-3">
                    <img class="img" src="img/rectangle-24.png" alt="" aria-hidden="true" />
                    <label class="text-wrapper-5" for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" aria-label="Email" />
                </div>
                <div class="group-2">
                    <img class="img" src="img/rectangle-25.png" alt="" aria-hidden="true" />
                    <label class="text-wrapper-4" for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password"
                        aria-label="Password" />
                </div>
                <div class="group-4">
                    <img class="rectangle-3" src="img/rectangle-159.svg" alt="" aria-hidden="true" />
                    <input id="remember-me" name="remember-me" type="checkbox" />
                    <label class="text-wrapper-7" for="remember-me">Remember me</label>
                </div>
                <a class="text-wrapper-2" href="#" role="button">Forgot Password</a>
                <button class="rectangle-2" type="submit" aria-label="Login"></button>
                <span class="text-wrapper-6">Login</span>
            </form>
        </section>
    </main>
</body>

</html>
